[env:esp32-e32r40t]
extends = esp32-4mb
board = esp32dev

build_flags =
    ${env.build_flags}
    -D USER_SETUP_LOADED=1
    
    ; Display-Treiber & Auflösung
    -D ST7796_DRIVER=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    
    ; Standard SPI-Pins für das E32R40T
    -D TFT_MISO=19
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=21
    -D TFT_RST=22
    -D TFT_BL=27          ; Hintergrundbeleuchtung (Backlight)
    -D TFT_BACKLIGHT_ON=1 ; 1 = High, 0 = Low
    
    ; Touchscreen-Einstellungen (SPI)
    -D TOUCH_CS=12
    -D SUPPORT_TRANSACTIONS=1
